server.port=8080
spring.application.name=trafficpay-backend

# Firebase
firebase.service-account-path=classpath:firebase-service-account.json

# JWT
app.jwt.secret=trafficPaySecretKey2026ForJWTSigningVeryLongAndSecure123456789ABCDEF

## ============================================================================
## TrafficPay Backend Configuration
## ============================================================================

## Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=trafficpay-backend

## Firebase Configuration
# Path to Firebase service account JSON key
# Download from: Firebase Console → Project Settings → Service Accounts → Generate Key
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}
firebase.project-id=${FIREBASE_PROJECT_ID:trafficpay-lk}

## JWT Authentication Configuration
# Secret key for signing JWT tokens (use a long, random, secure string)
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:trafficPaySecretKey2026ForJWTSigningVeryLongAndSecure123456789ABCDEF}

# Token expiration time in milliseconds (86400000 = 24 hours)
app.jwt.expiration=${JWT_EXPIRATION:86400000}

## Twilio SMS Configuration
# Get credentials from: https://www.twilio.com/console
# Account SID - unique identifier for your Twilio account
twilio.account-sid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_ACCOUNT_SID}

# Auth Token - used to authenticate API requests
twilio.auth-token=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_AUTH_TOKEN}

# From phone number - the Twilio number that will send SMS
# Must be purchased or verified in Twilio Console
twilio.phone-number=${TWILIO_PHONE_NUMBER:YOUR_TWILIO_PHONE_NUMBER}

## Logging Configuration
logging.level.root=INFO
logging.level.com.trafficpay=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

## Spring Security Configuration
# Session management (STATELESS for JWT)
spring.security.filter.order=5

## CORS Configuration
# Configured in SecurityConfig.java
# Allowed origins: http://localhost:5173, http://localhost:5174, etc.
